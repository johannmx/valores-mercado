services:
  api:
    build: ./web/api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - ALLOWED_ORIGINS=https://market.johatech.ar
    volumes:
      - ./api_data:/app/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always
    security_opt:
      - no-new-privileges:true

  client:
    build: 
      context: ./web/client
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    deploy:
      resources:
        limits:
          memory: 128M
    restart: always
    security_opt:
      - no-new-privileges:true
